      options: ["The scattering-length-density distribution", "The contrast between the phases", "The instrument resolution", "The visible colour of the sample"],
      correct: [0, 1, 2],
      why: "A, B and C all shape the small-angle signal. D is false — visible colour is an electronic/optical property unrelated to X-ray/neutron scattering-length contrast." },
    { topic: "Inelastic Scattering & Spectroscopy",
      lead: "Time-of-flight (TOF) spectrometers are a major way to measure dynamics.",
      q: "Which of the following are advantages of time-of-flight (TOF) spectrometers?",
      options: ["They can avoid using both a monochromator and an analyser", "They give access to wide regions of (Q, ω) space", "They can be built in direct- or indirect-geometry configurations", "They are only suitable for purely elastic scattering"],
      correct: [0, 1, 2],
      why: "A, B and C are real strengths of TOF instruments, which use neutron arrival time to encode energy. D is false — TOF is used precisely to measure inelastic (energy-changing) processes." },
    { topic: "Imaging & Tomography",
      lead: "Modern imaging beamlines offer several complementary contrast mechanisms.",
      q: "Which contrast mechanisms are available in X-ray and/or neutron imaging?",
      options: ["Attenuation (absorption) contrast", "Phase contrast", "Bragg-edge / energy-dependent contrast (neutrons)", "Spin-polarisation contrast available for X-rays"],
      correct: [0, 1, 2],
      why: "A, B and C are all used in practice. D is false — spin-polarisation (magnetic-field) imaging is neutron-only, exploiting the neutron's magnetic moment; X-ray photons cannot provide it." },
    { topic: "MRI & Diffusion Imaging",
      lead: "Diffusion MRI interprets water motion to infer tissue microstructure.",
      q: "Which statements about diffusion MRI are correct?",
      options: ["Free diffusion has an isotropic, Gaussian displacement distribution", "The b-value sets the amount of diffusion weighting", "Restricted diffusion along axons is anisotropic", "Diffusion contrast arises from the T1 (spin–lattice) relaxation pathway"],
      correct: [0, 1, 2],
      why: "A, B and C correctly describe diffusion behaviour and weighting. D is false — diffusion weighting is added to the T2 (transverse) signal pathway, not T1." },
    { topic: "Radiation Safety, Detectors & Activation",
      lead: "Material choice and procedures keep neutron instruments safe and functional.",
      q: "Which of the following are appropriate for neutron detection and/or safety?",
      options: ["Boron and lithium are used for their high neutron-absorption cross-sections", "Cadmium is used for shielding because of its high neutron absorption", "Radiation monitoring and controlled-access zones are essential safety measures", "Nickel is an ideal neutron-absorbing detector material"],
      correct: [0, 1, 2],
      why: "A, B and C are correct. D is false — nickel is prized for reflecting/guiding neutrons (neutron guides), not absorbing them; good absorbers are B, Li, Cd and Gd." },
  ]
};

const LETTERS = ["A","B","C","D","E","F"];

function shuffleOptions(item) {
  const order = item.options.map((_, i) => i);
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = order[i]; order[i] = order[j]; order[j] = t;
  }
  const old = item.options;
  item.options = order.map(i => old[i]);
  const set = new Set(item.correct);
  const nc = [];
  order.forEach((orig, pos) => { if (set.has(orig)) nc.push(pos); });
  item.correct = nc.sort((a, b) => a - b);
}
function shuffleMode(m) { QUESTIONS[m].forEach(shuffleOptions); }
shuffleMode("single");
shuffleMode("multi");

let mode = "single";
let idx = 0;
let view = "intro";
let answered = {};   // key `${mode}-${idx}` -> { selection:[], correct:bool }
let scores = { single: 0, multi: 0 };

const quizArea = document.getElementById("quizArea");
const counter = document.getElementById("counter");
const scoreLabel = document.getElementById("scoreLabel");
const progress = document.getElementById("progress");

document.querySelectorAll("#modeSeg button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#modeSeg button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    mode = btn.dataset.mode;
    idx = 0;
    view = "intro";
    tempSelection = [];
    render();
  });
});

function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  const sa = [...a].sort(), sb = [...b].sort();
  return sa.every((v, i) => v === sb[i]);
}

function renderIntro() {
  const isSingle = mode === "single";
  const total = QUESTIONS[mode].length;
  counter.textContent = isSingle ? "Part A" : "Part B";
  scoreLabel.textContent = "";
  progress.style.width = "0%";
  const title = isSingle ? "Part A · Single answer" : "Part B · Multiple answers";
  const summary = isSingle
    ? `${total} questions across the nine course topics.`
    : `${total} questions, one per course topic.`;
  const lines = isSingle ? [
    "Four answer options per question; exactly one is correct.",
    "Read the short note before each question.",
    "After answering, read the explanation to see why."
  ] : [
    "Four answer options per question; two or more may be correct.",
    "Select all answers you think are right, then press Check.",
    "After checking, read the explanation to see why."
  ];
  quizArea.innerHTML = `<div class="card intro">
      <span class="topic-tag">${title}</span>
      <h2>How it works</h2>
      <p class="intro-note">${summary}</p>
      <ul>${lines.map(l => `<li>${l}</li>`).join("")}</ul>
      <p class="intro-note">Your score is shown at the top as you go.</p>
      <div class="btn-row" style="justify-content:center;">
        <button class="nav" id="startBtn">Start ${isSingle ? "Part A" : "Part B"} &rarr;</button>
      </div>
    </div>`;
  document.getElementById("startBtn").addEventListener("click", () => {
    Object.keys(answered).forEach(k => { if (k.startsWith(mode + "-")) delete answered[k]; });
    scores[mode] = 0; idx = 0; tempSelection = []; view = "quiz"; render();
  });
}

function render() {
  if (view === "intro") { renderIntro(); return; }
  const list = QUESTIONS[mode];
  if (idx >= list.length) { renderResults(); return; }
  const item = list[idx];
  const key = `${mode}-${idx}`;
  const state = answered[key];

  counter.textContent = `Question ${idx + 1} of ${list.length}`;
  scoreLabel.textContent = `Score: ${scores[mode]} / ${list.length}`;
  progress.style.width = `${(idx / list.length) * 100}%`;

  let html = `<div class="card">
    <span class="topic-tag">${item.topic}</span>
    <p class="lead">${item.lead}</p>
    <p class="question">${item.q}</p>`;
  if (mode === "multi") html += `<p class="hint">Select all that apply, then press Check.</p>`;
  html += `<div class="options">`;

  item.options.forEach((opt, i) => {
    let cls = "option";
    if (state) {
      cls += " locked";
      if (item.correct.includes(i)) cls += " correct";
      else if (state.selection.includes(i)) cls += " wrong";
    } else if (mode === "multi" && tempSelection.includes(i)) {
      cls += " selected";
    }
    html += `<button class="${cls}" data-i="${i}">
        <span class="letter">${LETTERS[i]}</span>
        <span>${opt}</span>
      </button>`;
  });
  html += `</div>`;

  if (state) {
    const cls = state.correct ? "good" : "bad";
    const verdict = state.correct ? "Correct!" : "Not quite.";
    const correctLetters = item.correct.map(c => LETTERS[c]).join(", ");
    html += `<div class="explanation ${cls}">
        <strong>${verdict}</strong> Correct answer${item.correct.length>1?'s':''}: ${correctLetters}.<br>${item.why}
      </div>`;
  }

  html += `<div class="btn-row">
      <button class="nav ghost" id="prevBtn" ${idx === 0 ? "disabled" : ""}>&larr; Previous</button>`;
  if (!state && mode === "multi") {
    html += `<button class="nav" id="checkBtn">Check answer</button>`;
  } else if (state) {
    html += `<button class="nav" id="nextBtn">${idx === list.length - 1 ? "See results" : "Next &rarr;"}</button>`;
  } else {
    html += `<span></span>`;
  }
  html += `</div></div>`;

  quizArea.innerHTML = html;

  quizArea.querySelectorAll(".option").forEach(b => {
    b.addEventListener("click", () => onOptionClick(parseInt(b.dataset.i)));
  });
  const prevBtn = document.getElementById("prevBtn");
  if (prevBtn) prevBtn.addEventListener("click", () => { idx--; tempSelection = []; render(); });
  const nextBtn = document.getElementById("nextBtn");
  if (nextBtn) nextBtn.addEventListener("click", () => { idx++; tempSelection = []; render(); });
  const checkBtn = document.getElementById("checkBtn");
  if (checkBtn) checkBtn.addEventListener("click", commitMulti);
}

let tempSelection = [];

function onOptionClick(i) {
  const key = `${mode}-${idx}`;
  if (answered[key]) return;          // locked
  if (mode === "single") {
    const item = QUESTIONS.single[idx];
    const correct = arraysEqual([i], item.correct);
    answered[key] = { selection: [i], correct };
    if (correct) scores.single++;
    render();
  } else {
    if (tempSelection.includes(i)) tempSelection = tempSelection.filter(x => x !== i);
    else tempSelection.push(i);
    render();
  }
}

function commitMulti() {
  const key = `${mode}-${idx}`;
  if (tempSelection.length === 0) return;
  const item = QUESTIONS.multi[idx];
  const correct = arraysEqual(tempSelection, item.correct);
  answered[key] = { selection: [...tempSelection], correct };
  if (correct) scores.multi++;
  render();
}

function renderResults() {
  const list = QUESTIONS[mode];
  progress.style.width = `100%`;
  counter.textContent = `Finished`;
  scoreLabel.textContent = `Score: ${scores[mode]} / ${list.length}`;
  const pct = Math.round((scores[mode] / list.length) * 100);
  let msg;
  if (pct === 100) msg = "Outstanding — full marks!";
  else if (pct >= 75) msg = "Great work — strong understanding.";
  else if (pct >= 50) msg = "Good start — review the explanations and retry.";
  else msg = "Keep going — revisit the material and try again.";
  quizArea.innerHTML = `<div class="card results">
      <span class="topic-tag">${mode === "single" ? "Part A · Single answer" : "Part B · Multiple answers"}</span>
      <div class="score">${pct}%</div>
      <p>You answered <strong>${scores[mode]}</strong> of <strong>${list.length}</strong> correctly.</p>
      <p>${msg}</p>
      <div class="btn-row" style="justify-content:center;">
        <button class="nav" id="retryBtn">Try again</button>
        <button class="nav ghost" id="switchBtn">${mode === "single" ? "Go to Part B &rarr;" : "&larr; Back to Part A"}</button>
      </div>
    </div>`;
  document.getElementById("retryBtn").addEventListener("click", () => {
    Object.keys(answered).forEach(k => { if (k.startsWith(mode + "-")) delete answered[k]; });
    scores[mode] = 0; idx = 0; tempSelection = []; shuffleMode(mode); view = "quiz"; render();
  });
  document.getElementById("switchBtn").addEventListener("click", () => {
    document.querySelector(`#modeSeg button[data-mode="${mode === "single" ? "multi" : "single"}"]`).click();
  });
}

render();
</script>
</body>
</html>
